<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>AmirScriptZ - Best Roblox Scripts</title>\n    <style>\n        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }\n        header { background: #4CAF50; color: white; padding: 10px 20px; text-align: center; }\n        .container { padding: 20px; max-width: 1200px; margin: auto; }\n        .product { border: 1px solid #ccc; border-radius: 5px; padding: 15px; margin: 10px 0; }\n        .shop-cart { position: fixed; top: 20px; right: 20px; }\n        .shop-cart { background: #FFC107; padding: 10px; border-radius: 8px; cursor: pointer; }\n        .shop-cart:hover { background: #FF9800; }\n        .filter { margin: 20px; }\n        .filter select { padding: 5px; }\n    </style>\n</head>\n<body>\n<header>\n    <h1>AmirScriptZ - Your Favorite Roblox Scripts</h1>\n</header>\n<div class="container">\n    <div class="filter">\n        <label for="category">Filter by Category:</label>\n        <select id="category" onchange="filterProducts()">\n            <option value="all">All</option>\n            <option value="tools">Tools</option>\n            <option value="hacks">Hacks</option>\n        </select>\n    </div>\n    <div class="products">\n        <div class="product" data-category="tools">\n            <h2>Best Script Tool</h2>\n            <p>Price: $10</p>\n            <button onclick="addToCart('Best Script Tool', 10)">Add to Cart</button>\n        </div>\n        <div class="product" data-category="hacks">\n            <h2>Ultimate Game Hack</h2>\n            <p>Price: $15</p>\n            <button onclick="addToCart('Ultimate Game Hack', 15)">Add to Cart</button>\n        </div>\n    </div>\n    <div class="shop-cart" id="cart">\n        Cart (0)\n    </div>\n</div>\n<script>\n    let cart = [];\n\n    function addToCart(product, price) {\n        cart.push({ product, price });\n        document.getElementById('cart').innerHTML = 'Cart (' + cart.length + ')';\n        alert(product + ' has been added to your cart!');\n    }\n\n    function filterProducts() {\n        const category = document.getElementById('category').value;\n        const products = document.querySelectorAll('.product');\n        products.forEach(product => {\n            if (category === 'all' || product.dataset.category === category) {\n                product.style.display = 'block';\n            } else {\n                product.style.display = 'none';\n            }\n        });\n    }\n</script>\n</body>\n</html>
