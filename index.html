<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZareVoice - Peer-to-Peer Voice Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            color: #00ff00;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
            margin-top: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(0, 255, 0, 0.05);
            border: 1px solid #00ff00;
            border-radius: 15px;
        }
        
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }
        
        .header .subtitle {
            color: #666;
            font-size: 14px;
        }
        
        .status-bar {
            background: #111;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff4444;
            display: inline-block;
            margin-right: 10px;
            animation: pulse 2s infinite;
        }
        
        .status-indicator.connected {
            background: #00ff00;
            box-shadow: 0 0 10px #00ff00;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .btn {
            padding: 20px;
            border: 1px solid #00ff00;
            background: rgba(0, 255, 0, 0.05);
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s;
            text-align: center;
        }
        
        .btn:hover {
            background: rgba(0, 255, 0, 0.2);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
            transform: translateY(-2px);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn.active {
            background: #00ff00;
            color: #000;
        }
        
        .btn.disconnect {
            border-color: #ff4444;
            color: #ff4444;
        }
        
        .btn.disconnect:hover {
            background: rgba(255, 68, 68, 0.2);
            box-shadow: 0 0 20px rgba(255, 68, 68, 0.3);
        }
        
        .room-section {
            background: #111;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }
        
        .room-section h3 {
            color: #00ff00;
            margin-bottom: 15px;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        input {
            flex: 1;
            background: #000;
            color: #00ff00;
            border: 1px solid #333;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            border-radius: 5px;
            outline: none;
        }
        
        input:focus {
            border-color: #00ff00;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
        }
        
        .copy-btn {
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid #00ff00;
            color: #00ff00;
            padding: 12px 20px;
            cursor: pointer;
            font-family: monospace;
            border-radius: 5px;
            white-space: nowrap;
        }
        
        .info-text {
            color: #666;
            font-size: 13px;
            margin-top: 10px;
        }
        
        .peer-list {
            margin-top: 15px;
        }
        
        .peer-item {
            background: rgba(0, 255, 0, 0.03);
            border: 1px solid #333;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .peer-dot {
            width: 8px;
            height: 8px;
            background: #00ff00;
            border-radius: 50%;
            margin-right: 10px;
        }
        
        .footer {
            margin-top: 30px;
            text-align: center;
            color: #444;
            font-size: 12px;
        }
        
        .footer a {
            color: #00ff00;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎤 ZareVoice</h1>
            <p class="subtitle">Peer-to-Peer Encrypted Voice Chat</p>
        </div>
        
        <div class="status-bar">
            <div>
                <span class="status-indicator" id="statusDot"></span>
                <span id="statusText">Im ready</span>
            </div>
            <span style="color:#666;">ساخته شده توسط زارع</span>
        </div>
        
        <div class="controls">
            <button class="btn" id="micBtn" onclick="toggleMic()">
                🎙️ <span id="micText">Start Mic</span>
            </button>
            <button class="btn" id="speakerBtn" onclick="toggleSpeaker()">
                🔊 <span id="speakerText">Start Speaker</span>
            </button>
        </div>
        
        <div class="room-section">
            <h3>🔗 Room Connection</h3>
            <div class="input-group">
                <input type="text" id="roomId" placeholder="Enter Room ID..." />
                <button class="btn" onclick="joinRoom()" style="padding:12px 20px;">
                    Join
                </button>
            </div>
            <p class="info-text">💡 Create a room: just type any name and share it</p>
            
            <div style="margin-top:15px;">
                <button class="copy-btn" onclick="shareRoom()">
                    📋 Copy Room Link
                </button>
            </div>
            
            <div class="peer-list" id="peerList">
                <p class="info-text">No peers connected</p>
            </div>
        </div>
        
        <div class="footer">
            <p>ساخته شده توسط <a href="#">زارع</a> | ZareVoice v1.0</p>
        </div>
    </div>

    <script>
        let localStream = null;
        let peerConnection = null;
        let micEnabled = false;
        let speakerEnabled = false;
        let roomId = null;
        
        // ========== STATUS ==========
        function updateStatus(text, connected = false) {
            document.getElementById('statusText').textContent = text;
            const dot = document.getElementById('statusDot');
            if (connected) {
                dot.classList.add('connected');
            } else {
                dot.classList.remove('connected');
            }
        }
        
        // ========== MICROPHONE ==========
        async function toggleMic() {
            const btn = document.getElementById('micBtn');
            const text = document.getElementById('micText');
            
            if (!micEnabled) {
                try {
                    localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    micEnabled = true;
                    btn.classList.add('active');
                    text.textContent = 'Mute Mic';
                    updateStatus('🎙️ Microphone active', false);
                    
                    // Auto-join if room ID is set
                    if (roomId) {
                        startConnection();
                    }
                } catch (err) {
                    alert('❌ Microphone access denied!');
                    console.error(err);
                }
            } else {
                if (localStream) {
                    localStream.getTracks().forEach(track => track.stop());
                }
                micEnabled = false;
                btn.classList.remove('active');
                text.textContent = 'Start Mic';
                updateStatus('Mic disabled', false);
                closeConnection();
            }
        }
        
        // ========== SPEAKER ==========
        function toggleSpeaker() {
            const btn = document.getElementById('speakerBtn');
            const text = document.getElementById('speakerText');
            
            speakerEnabled = !speakerEnabled;
            
            if (speakerEnabled) {
                btn.classList.add('active');
                text.textContent = 'Mute Speaker';
                updateStatus('🔊 Speaker active', true);
            } else {
                btn.classList.remove('active');
                text.textContent = 'Start Speaker';
                updateStatus('Speaker muted', false);
            }
        }
        
        // ========== WEBRTC ==========
        const configuration = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        };
        
        function startConnection() {
            if (!micEnabled) {
                alert('❌ Enable microphone first!');
                return;
            }
            
            peerConnection = new RTCPeerConnection(configuration);
            
            // Add local stream
            if (localStream) {
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });
            }
            
            // Handle incoming audio
            peerConnection.ontrack = (event) => {
                if (speakerEnabled) {
                    const audio = new Audio();
                    audio.srcObject = event.streams[0];
                    audio.play();
                    updateStatus('🔊 Receiving audio', true);
                }
            };
            
            // ICE candidates
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    console.log('ICE candidate:', event.candidate);
                }
            };
            
            peerConnection.onconnectionstatechange = () => {
                console.log('Connection state:', peerConnection.connectionState);
                if (peerConnection.connectionState === 'connected') {
                    updateStatus('🟢 Connected!', true);
                    addPeer('Remote Peer');
                }
            };
            
            updateStatus('🔄 Connecting...', false);
            
            // Create offer
            peerConnection.createOffer()
                .then(offer => peerConnection.setLocalDescription(offer))
                .then(() => {
                    console.log('Offer created. Share this SDP with peer.');
                    updateStatus('📤 Offer ready. Waiting for peer...', false);
                });
        }
        
        function closeConnection() {
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            updateStatus('Disconnected', false);
            document.getElementById('peerList').innerHTML = '<p class="info-text">No peers connected</p>';
        }
        
        // ========== ROOM ==========
        function joinRoom() {
            const input = document.getElementById('roomId');
            const room = input.value.trim();
            
            if (!room) {
                alert('❌ Enter a room ID!');
                return;
            }
            
            roomId = room;
            updateStatus(`📁 Room: ${roomId}`, false);
            
            if (micEnabled) {
                startConnection();
            }
        }
        
        function shareRoom() {
            if (!roomId) {
                alert('❌ Join or create a room first!');
                return;
            }
            
            const link = `${window.location.href}?room=${encodeURIComponent(roomId)}`;
            navigator.clipboard.writeText(link).then(() => {
                const btn = event.target;
                btn.textContent = '✅ Copied!';
                setTimeout(() => { btn.textContent = '📋 Copy Room Link'; }, 2000);
            });
        }
        
        function addPeer(name) {
            document.getElementById('peerList').innerHTML = `
                <div class="peer-item">
                    <span><span class="peer-dot"></span> ${name}</span>
                    <span style="color:#00ff00;">● Connected</span>
                </div>
            `;
        }
        
        // ========== INIT ==========
        updateStatus('Ready - Click Start Mic', false);
        
        // Check for room in URL
        const params = new URLSearchParams(window.location.search);
        const urlRoom = params.get('room');
        if (urlRoom) {
            document.getElementById('roomId').value = urlRoom;
            updateStatus(`📁 Room found: ${urlRoom}`, false);
        }
        
        // Warn before leaving
        window.addEventListener('beforeunload', () => {
            if (micEnabled) {
                return 'You are in a voice chat. Leave?';
            }
        });
    </script>
</body>
</html>
